name: SecurePipe — DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: securepipe-app
  IMAGE_TAG: ${{ github.sha }}
  SONAR_PROJECT_KEY: securepipe

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1: Secrets Detection (Trufflehog)
  # ─────────────────────────────────────────────
  secrets-scan:
    name: 🔐 Secrets Detection — Trufflehog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for Trufflehog

      - name: Run Trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./          
          extra_args: --only-verified

  # ─────────────────────────────────────────────
  # STAGE 2: Build Docker Image
  # ─────────────────────────────────────────────
  build:
    name: 🔨 Build Docker Image
    runs-on: ubuntu-latest
    needs: secrets-scan
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ─────────────────────────────────────────────
  # STAGE 3: SAST — SonarQube
  # ─────────────────────────────────────────────
  sast-sonarqube:
    name: 🔍 SAST — SonarQube
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          cd app
          pytest tests/ --cov=. --cov-report=xml --cov-report=term -v
        continue-on-error: true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.sources=app
            -Dsonar.python.coverage.reportPaths=app/coverage.xml
            -Dsonar.qualitygate.wait=true

  # ─────────────────────────────────────────────
  # STAGE 4: Container Scan — Trivy
  # ─────────────────────────────────────────────
  container-scan:
    name: 🐳 Container Scan — Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"         # Fails pipeline on CRITICAL/HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: trivy-container

      - name: Save Trivy results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.sarif

  # ─────────────────────────────────────────────
  # STAGE 5: IaC Scan — Checkov
  # ─────────────────────────────────────────────
  iac-scan:
    name: 🏗️ IaC Scan — Checkov
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
          skip_check: CKV_AWS_8   # Example: skip specific check if justified

      - name: Upload Checkov SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov-iac

      - name: Save Checkov results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-report
          path: checkov-results.sarif

  # ─────────────────────────────────────────────
  # STAGE 6: DAST — OWASP ZAP
  # ─────────────────────────────────────────────
  dast-owasp-zap:
    name: 🌐 DAST — OWASP ZAP
    runs-on: ubuntu-latest
    needs: [build, sast-sonarqube, container-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Start application for DAST scan
        run: |
          docker run -d \
            --name securepipe-app \
            -p 5000:5000 \
            --user 1001:1001 \
            --read-only \
            --tmpfs /tmp \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

          # Wait for app to be healthy
          echo "Waiting for app to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:5000/health; then
              echo "App is ready!"
              break
            fi
            sleep 2
          done

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          fail_action: true
          artifact_name: zap-baseline-report

      - name: Run OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: "http://localhost:5000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          artifact_name: zap-full-report

      - name: Stop application
        if: always()
        run: docker stop securepipe-app || true

  # ─────────────────────────────────────────────
  # STAGE 7: Deploy (only if all stages pass)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [sast-sonarqube, container-scan, iac-scan, dast-owasp-zap]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Deploy container
        run: |
          # Stop old container if running
          docker stop securepipe-prod 2>/dev/null || true
          docker rm securepipe-prod 2>/dev/null || true

          # Deploy new hardened container
          docker run -d \
            --name securepipe-prod \
            -p 5000:5000 \
            --restart unless-stopped \
            --user 1001:1001 \
            --read-only \
            --tmpfs /tmp \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --memory 256m \
            --cpus 0.5 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Health check post-deploy
        run: |
          sleep 10
          curl -f http://localhost:5000/health || (docker logs securepipe-prod && exit 1)
          echo "✅ Deployment successful!"

      - name: Pipeline Summary
        run: |
          echo "## 🛡️ SecurePipe Security Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Secrets Scan (Trufflehog) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 SAST (SonarQube) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Container Scan (Trivy) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ IaC Scan (Checkov) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 DAST (OWASP ZAP) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | ${{ env.IMAGE_TAG }} |" >> $GITHUB_STEP_SUMMARY
