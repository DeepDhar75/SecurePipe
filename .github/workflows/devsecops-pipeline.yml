name: SecurePipe — DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: securepipe-app
  IMAGE_TAG: ${{ github.sha }}
  SONAR_PROJECT_KEY: DeepDhar75_SecurePipe

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # STAGE 1: Secrets Detection
  secrets-scan:
    name: 🔐 Secrets Detection — Trufflehog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # STAGE 2: Build Docker Image
  build:
    name: 🔨 Build Docker Image
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # STAGE 3: SAST — SonarQube
  sast-sonarqube:
    name: 🔍 SAST — SonarQube
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and run tests
        run: |
          pip install -r app/requirements.txt
          pip install pytest pytest-cov
          cd app
          pytest tests/ --cov=. --cov-report=xml -v || true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # STAGE 4: IaC Scan — Checkov
  iac-scan:
    name: 🏗️ IaC Scan — Checkov
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true
          skip_check: CKV_AWS_144,CKV2_AWS_12,CKV2_AWS_11

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov-iac
        continue-on-error: true

      - name: Save Checkov artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-report
          path: checkov-results.sarif

  # STAGE 5: Container Scan — Trivy
  container-scan:
    name: 🐳 Container Scan — Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container
        continue-on-error: true

      - name: Save Trivy artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.sarif

  # STAGE 6: DAST — OWASP ZAP
  dast-owasp-zap:
    name: 🌐 DAST — OWASP ZAP
    runs-on: ubuntu-latest
    needs: [build, sast-sonarqube, container-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load and start app
        run: |
          docker load --input /tmp/image.tar
          docker run -d --name securepipe-app -p 5000:5000 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          for i in {1..30}; do
            curl -sf http://localhost:5000/health && echo "App ready!" && break
            sleep 2
          done

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          fail_action: false
          artifact_name: zap-report

      - name: Stop app
        if: always()
        run: docker stop securepipe-app || true

  # STAGE 7: Deploy
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [sast-sonarqube, container-scan, iac-scan, dast-owasp-zap]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load and deploy
        run: |
          docker load --input /tmp/image.tar
          docker stop securepipe-prod 2>/dev/null || true
          docker rm securepipe-prod 2>/dev/null || true
          docker run -d \
            --name securepipe-prod \
            -p 5000:5000 \
            --user 1001:1001 \
            --read-only \
            --tmpfs /tmp \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --memory 256m \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          sleep 5
          curl -f http://localhost:5000/health && echo "Deploy successful!"

      - name: Pipeline Summary
        run: |
          echo "## 🛡️ SecurePipe Security Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Secrets | Trufflehog | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 SAST | SonarQube | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ IaC | Checkov | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Container | Trivy | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 DAST | OWASP ZAP | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy | Docker | ✅ |" >> $GITHUB_STEP_SUMMARY